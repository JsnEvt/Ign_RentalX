name: CI

on:
  push:
    branches: [main]
    
  workflow_dispatch: 
  
  jobs:
    buid:
      runs-on: ubuntu-lattest
      
      steps:
        - uses: actions/checkout@v2
        
        - name: Setup Nodejs
          uses: actions/setup-node@v2
          with:
            node-version: 18.x
            
        - name: Install dependecies
          run: yarn
          
        - name: Build
          run: yarn build
          
        - uses: appleboy/scp-action@v0.1.4
          with:
            host: ${{ secrets.SSH_HOST }}
            username: ${{ secrets.SSH_USER }}
            port: ${{ secrets.SSH_PORT }}
            key: ${{secrets.SSH_KEY}}
            source: "., !node_modules"
            target: "test"
          
        
